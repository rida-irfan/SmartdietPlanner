version: '3.9'

services:
  db:
    image: mongo:7.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    volumes:
      - mongo-data:/data/db
    ports:
      - '27017:27017'

  server:
    build: ./server
    restart: unless-stopped
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://root:example@db:27017/smart_diet_planner?authSource=admin
      - JWT_SECRET=supersecretkey
      - JWT_EXPIRES_IN=7d
    ports:
      - '5000:5000'
    depends_on:
      - db

  client:
    build:
      context: ./client
      args:
        VITE_API_URL=http://localhost:5000/api
    restart: unless-stopped
    ports:
      - '3000:4173'
    depends_on:
      - server

volumes:
  mongo-data:
